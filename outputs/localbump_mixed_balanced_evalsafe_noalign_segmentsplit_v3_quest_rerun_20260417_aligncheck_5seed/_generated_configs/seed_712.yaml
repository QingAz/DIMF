seed: 712
strict_requirements: true
data:
  csv_path: data/processed/LiquidSugar_local_bump_mixed_balanced_evalsafe_segmentsplit_v3_rawgap.csv
  time_col: TimeStamp
  target_col: yield_flow
  feed_prefix: feed_
  stage1_prefix: stage1_
  stage2_prefix: stage2_
  stage3_prefix: stage3_
  split_mode: predefined_valid_segments
  split_col: split
  collection_interval_min: 15
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  L: 96
  H: 4
  L_max: 23
  gap_break_min: 120
  gap_fill_min: 60
  fillna: ffill
  use_delta_t: true
  use_missing_mask: true
  include_target_history: false
model:
  encoder: transformer
  hidden_dim: 64
  num_layers: 2
  dropout: 0.1
  attn_dim: 64
  lag_emb: true
  use_alignment: false
  align_tau: 0.7
  align_dropout: 0.0
  transformer_nhead: 4
  transformer_ff_dim: 256
train:
  epochs: 150
  batch_size: 64
  lr: 0.0005
  weight_decay: 0.0001
  grad_clip: 1.0
  pred_warmup_epochs: 10
  ramp_epochs: 20
  lambda_align: 0.1
  lambda_ent: 0.002
  lambda_tv: 0.005
  lambda_lag_supervision: 0.0
  align_loss_temp: 0.2
  checkpoint_metric: val_pred
logging:
  output_dir: outputs/localbump_mixed_balanced_evalsafe_noalign_segmentsplit_v3_quest_rerun_20260417_aligncheck_5seed/seed_712
  log_path: outputs/localbump_mixed_balanced_evalsafe_noalign_segmentsplit_v3_quest_rerun_20260417_aligncheck_5seed/seed_712/train_log.jsonl
  ckpt_path: artifacts/localbump_mixed_balanced_evalsafe_noalign_segmentsplit_v3_quest_rerun_20260417_aligncheck_5seed/seed_712/best.ckpt
  scaler_path: artifacts/localbump_mixed_balanced_evalsafe_noalign_segmentsplit_v3_quest_rerun_20260417_aligncheck_5seed/seed_712/scaler.pkl
