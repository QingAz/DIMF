seed: 42
seeds: [42, 134, 456, 321, 712]

data:
  csv_path: data/processed/LiquidSugar_linear_interpolated.csv
  time_col: TimeStamp
  target_col: yield_flow

  # feature groups (prefix matching)
  feed_prefix: feed_
  stage1_prefix: stage1_
  stage2_prefix: stage2_
  stage3_prefix: stage3_

  # align the split protocol with MultistageNet's valid contiguous windows
  split_mode: valid_segments   # rows / valid_segments
  collection_interval_min: 15
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

  # align the task definition with MultistageNet for apples-to-apples comparison
  L: 24
  H: 1
  L_max: 23

  # the interpolated copy is already regularized, so this only applies if new NaNs appear later
  fillna: ffill
  use_delta_t: false
  include_target_history: true

model:
  # keep DIMF architecture, but use a compact DIMF-friendly setup for shorter windows
  encoder: transformer
  hidden_dim: 64
  num_layers: 2
  dropout: 0.1

  # delay alignment
  attn_dim: 64
  lag_emb: true

  # transformer only
  transformer_nhead: 4
  transformer_ff_dim: 256

train:
  # recommended DIMF-side starting point for aligned comparison.
  # final "best" settings still need GPU tuning.
  epochs: 150
  batch_size: 64
  lr: 0.0005
  weight_decay: 0.0001
  grad_clip: 1.0

  # regularization weights
  lambda_ent: 0.002
  lambda_tv: 0.005

logging:
  output_dir: outputs/multistage_aligned_linear_interp
  log_path: outputs/multistage_aligned_linear_interp/train_log.jsonl
  ckpt_path: artifacts/multistage_aligned_linear_interp/best.ckpt
  scaler_path: artifacts/multistage_aligned_linear_interp/scaler.pkl
