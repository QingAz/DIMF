seed: 42

data:
  csv_path: data/processed/LiquidSugar_stage2_lag_rawgap.csv
  time_col: TimeStamp
  target_col: yield_flow

  feed_prefix: feed_
  stage1_prefix: stage1_
  stage2_prefix: stage2_
  stage3_prefix: stage3_

  split_mode: predefined_valid_segments
  split_col: split
  collection_interval_min: 15
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2

  L: 24
  H: 1
  L_max: 23

  fillna: none
  use_delta_t: false
  include_target_history: true

model:
  encoder: transformer
  hidden_dim: 64
  num_layers: 2
  dropout: 0.1
  attn_dim: 64
  lag_emb: true
  use_alignment: true
  transformer_nhead: 4
  transformer_ff_dim: 256

train:
  epochs: 150
  batch_size: 64
  lr: 0.0005
  weight_decay: 0.0001
  grad_clip: 1.0
  lambda_ent: 0.002
  lambda_tv: 0.005

logging:
  output_dir: outputs/rawgap_stage2lag_aligned
  log_path: outputs/rawgap_stage2lag_aligned/train_log.jsonl
  ckpt_path: artifacts/rawgap_stage2lag_aligned/best.ckpt
  scaler_path: artifacts/rawgap_stage2lag_aligned/scaler.pkl
